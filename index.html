<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>since2027</title>

<!-- Favicon -->
<link rel="icon" type="image/svg+xml" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><defs><linearGradient id='g' x1='0' y1='0' x2='1' y2='1'><stop offset='0' stop-color='%23d4a955'/><stop offset='1' stop-color='%23b8913a'/></linearGradient></defs><rect width='64' height='64' rx='14' fill='url(%23g)'/><g fill='none' stroke='%23fffaf0' stroke-width='2.6' stroke-linecap='round' stroke-linejoin='round'><path d='M32 14c-8 6-12 14-12 22 0 8 5 14 12 14s12-6 12-14c0-8-4-16-12-22z'/><path d='M32 18v32'/><path d='M32 26c-3-1-5-3-7-5'/><path d='M32 26c3-1 5-3 7-5'/><path d='M32 34c-4-1-7-3-9-5'/><path d='M32 34c4-1 7-3 9-5'/><path d='M32 42c-3-1-5-2-7-4'/><path d='M32 42c3-1 5-2 7-4'/></g></svg>">

<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f7f5;
    --border: #e5e2db;
    --accent: #b8913a;
    --accent-dim: #c8a96e;
    --accent-light: rgba(184,145,58,0.1);
    --text: #1a1916;
    --text-muted: #8a857a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── 초기 로딩 (인증/라우팅 진행 중) ── */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    flex-direction: column; gap: 16px;
  }
  #boot.hide { display: none; }
  #boot .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot .msg {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase;
  }

  /* ── 로그인 화면 ── */
  #login { display: none; flex-direction: column; align-items: center; }
  #login.show { display: flex; }

  .login-box {
    text-align: center; max-width: 380px; width: 100%;
    animation: fadeIn 0.4s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .login-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #d4a955, #b8913a);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(184,145,58,0.25);
  }
  .login-logo svg { width: 36px; height: 36px; }

  .login-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px;
  }

  .login-title {
    font-size: 32px; font-weight: 700; color: var(--text);
    letter-spacing: -0.02em; margin-bottom: 10px;
    line-height: 1.2;
  }
  .login-title span { color: var(--accent); }

  .login-desc {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--text-muted); margin-bottom: 36px; line-height: 1.7;
  }

  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 15px 22px;
    background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
    cursor: pointer; font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 600; color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .google-btn:hover {
    border-color: var(--accent-dim);
    box-shadow: 0 4px 16px rgba(184,145,58,0.15);
    transform: translateY(-1px);
  }
  .google-btn:active { transform: translateY(0); }
  .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

  .login-error {
    margin-top: 20px; padding: 14px 18px;
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 11.5px; color: #dc2626;
    display: none; line-height: 1.6;
  }
  .login-error.show { display: block; }

  .login-loading {
    margin-top: 20px; font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-muted); display: none;
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .login-loading.show { display: block; }

  footer {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase;
  }
</style>
</head>
<body>

<!-- 초기 부팅 (인증 상태 확인 중) -->
<div id="boot">
  <div class="spinner"></div>
  <div class="msg">Verifying</div>
</div>

<!-- 로그인 화면 (필요 시 표시) -->
<div id="login">
  <div class="login-box">
    <div class="login-logo">
      <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <g fill="none" stroke="#fffaf0" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round">
          <path d="M32 14c-8 6-12 14-12 22 0 8 5 14 12 14s12-6 12-14c0-8-4-16-12-22z"/>
          <path d="M32 18v32"/>
          <path d="M32 26c-3-1-5-3-7-5"/>
          <path d="M32 26c3-1 5-3 7-5"/>
          <path d="M32 34c-4-1-7-3-9-5"/>
          <path d="M32 34c4-1 7-3 9-5"/>
          <path d="M32 42c-3-1-5-2-7-4"/>
          <path d="M32 42c3-1 5-2 7-4"/>
        </g>
      </svg>
    </div>
    <div class="login-label">since 2027</div>
    <h1 class="login-title">since<span>2027</span></h1>
    <p class="login-desc">
      Google 계정으로 로그인하여<br>
      허가된 콘텐츠에 접속하세요
    </p>
    <button class="google-btn" onclick="signInWithGoogle()">
      <svg class="google-icon" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
        <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.258h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
        <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
      </svg>
      Google 계정으로 로그인
    </button>
    <div class="login-error" id="login-error"></div>
    <div class="login-loading" id="login-loading">접속 정보 확인 중...</div>
  </div>
</div>

<footer>since2027.com</footer>

<!-- ============================================================ -->
<!-- Firebase + 라우팅                                                -->
<!-- ============================================================ -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtodnuV2rXtJXHJb2kc0AjeLQIWbv1yzA",
  authDomain: "since2027-3fb3c.firebaseapp.com",
  projectId: "since2027-3fb3c",
  storageBucket: "since2027-3fb3c.firebasestorage.app",
  messagingSenderId: "931680118450",
  appId: "1:931680118450:web:e6c4b67cb77597f5164bab"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

const boot       = document.getElementById('boot');
const loginEl    = document.getElementById('login');
const errorEl    = document.getElementById('login-error');
const loadingEl  = document.getElementById('login-loading');

// ── 그룹별 홈 페이지 매핑 ──────────────────────────────
// 이 매핑이 라우팅의 핵심. 새 역할 추가 시 여기만 수정하면 됨.
const ROLE_HOME = {
  admin:   '/admin.html',
  grade1:  '/study.html',
  grade2:  '/study.html',
  grade3:  '/study.html',
  grade4:  '/study.html',
  alumni:  '/study.html',
  family1: '/family/family1.html',
  family2: '/family/family2.html',
  family3: '/family/family3.html',
  family4: '/family/family4.html',
  family5: '/family/family5.html'
};

// 안전한 내부 경로인지 확인 (오픈 리다이렉트 방지)
function isSafePath(p) {
  return typeof p === 'string'
    && p.startsWith('/')
    && !p.startsWith('//')
    && !p.includes('://');
}

// ?from=... 파라미터 추출 (콘텐츠 페이지에서 비로그인 시 돌아갈 위치)
function getFromParam() {
  const params = new URLSearchParams(window.location.search);
  const from = params.get('from');
  return isSafePath(from) ? from : null;
}

// 화면 전환
function showLogin() {
  boot.classList.add('hide');
  loginEl.classList.add('show');
}

function showError(message) {
  errorEl.textContent = message;
  errorEl.classList.add('show');
}

function clearError() {
  errorEl.classList.remove('show');
  errorEl.textContent = '';
}

function showLoading() {
  loadingEl.classList.add('show');
}

function hideLoading() {
  loadingEl.classList.remove('show');
}

// ── Firestore: authRequired 플래그 ────────────────────
async function getAuthRequired() {
  try {
    const snap = await getDoc(doc(db, 'config', 'access'));
    if (snap.exists()) return snap.data().authRequired !== false;
    return true;
  } catch (e) { return true; }
}

// ── 사용자 정보 + 라우팅 ──────────────────────────────
async function routeUser(user) {
  showLoading();
  clearError();

  let userData;
  try {
    const snap = await getDoc(doc(db, 'allowedUsers', user.email));
    userData = snap.exists() ? snap.data() : null;
  } catch (e) {
    hideLoading();
    showError('접속 정보 확인 중 오류가 발생했습니다.');
    await fbSignOut(auth);
    showLogin();
    return;
  }

  if (!userData) {
    // 등록되지 않은 사용자
    hideLoading();
    await fbSignOut(auth);
    showLogin();
    showError(`${user.email} 은(는) 접근 권한이 없습니다.`);
    return;
  }

  const role = userData.role;

  // 1) 콘텐츠 페이지에서 비로그인으로 튕겨나와 로그인 후 돌아가는 경우
  //    auth-guard.js가 페이지에서 권한 검사하므로 여기서는 그냥 보내준다
  const from = getFromParam();
  if (from) {
    window.location.replace(from);
    return;
  }

  // 2) 역할별 홈으로 라우팅
  const home = ROLE_HOME[role];
  if (home) {
    window.location.replace(home);
  } else {
    // 알 수 없는 역할 — 로그아웃 처리
    hideLoading();
    await fbSignOut(auth);
    showLogin();
    showError('역할 설정 오류입니다. 관리자에게 문의하세요.');
  }
}

// ── 시작 ─────────────────────────────────────────────
(async () => {
  const authRequired = await getAuthRequired();

  if (!authRequired) {
    // 로그인 OFF 모드: 학생용 메인을 기본으로 보여줌
    window.location.replace('/study.html');
    return;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await routeUser(user);
    } else {
      // 비로그인 → 로그인 화면
      showLogin();
    }
  });
})();

// ── Google 로그인 ─────────────────────────────────────
window.signInWithGoogle = async () => {
  clearError();
  try {
    await signInWithPopup(auth, provider);
    // 성공 시 onAuthStateChanged가 자동으로 routeUser 호출
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showError('로그인 중 오류가 발생했습니다.');
    }
  }
};
</script>
</body>
</html>
