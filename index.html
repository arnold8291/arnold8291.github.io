<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<style>
  :root {
    --bg: #ffffff;
    --surface: #f8f7f5;
    --border: #e5e2db;
    --accent: #b8913a;
    --accent-dim: #c8a96e;
    --accent-light: rgba(184,145,58,0.1);
    --text: #1a1916;
    --text-muted: #8a857a;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Noto Serif KR', serif;
    min-height: 100vh;
  }

  body {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    padding: 20px;
  }

  /* ── 초기 로딩 (인증/라우팅 진행 중) ── */
  #boot {
    position: fixed; inset: 0;
    display: flex; align-items: center; justify-content: center;
    background: var(--bg);
    z-index: 100;
    flex-direction: column; gap: 16px;
  }
  #boot.hide { display: none; }
  #boot .spinner {
    width: 32px; height: 32px;
    border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.8s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  #boot .msg {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase;
  }

  /* ── 로그인 화면 ── */
  #login { display: none; flex-direction: column; align-items: center; }
  #login.show { display: flex; }

  .login-box {
    text-align: center; max-width: 380px; width: 100%;
    animation: fadeIn 0.4s ease both;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

  .login-logo {
    width: 64px; height: 64px;
    background: linear-gradient(135deg, #d4a955, #b8913a);
    border-radius: 16px;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 24px;
    box-shadow: 0 8px 24px rgba(184,145,58,0.25);
  }
  .login-logo svg { width: 36px; height: 36px; }

  .login-label {
    font-family: 'DM Mono', monospace;
    font-size: 11px; letter-spacing: 0.22em;
    color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px;
  }

  .login-title {
    font-size: 32px; font-weight: 700; color: var(--text);
    letter-spacing: -0.02em; margin-bottom: 10px;
    line-height: 1.2;
  }
  .login-title span { color: var(--accent); }

  .login-desc {
    font-family: 'DM Mono', monospace; font-size: 12px;
    color: var(--text-muted); margin-bottom: 36px; line-height: 1.7;
  }

  .google-btn {
    display: flex; align-items: center; justify-content: center; gap: 12px;
    width: 100%; padding: 15px 22px;
    background: #fff; border: 1.5px solid var(--border); border-radius: 12px;
    cursor: pointer; font-family: 'Noto Serif KR', serif;
    font-size: 14px; font-weight: 600; color: var(--text);
    transition: border-color 0.2s, box-shadow 0.2s, transform 0.15s;
    box-shadow: 0 1px 6px rgba(0,0,0,0.06);
  }
  .google-btn:hover {
    border-color: var(--accent-dim);
    box-shadow: 0 4px 16px rgba(184,145,58,0.15);
    transform: translateY(-1px);
  }
  .google-btn:active { transform: translateY(0); }
  .google-icon { width: 20px; height: 20px; flex-shrink: 0; }

  .login-error {
    margin-top: 20px; padding: 14px 18px;
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 10px;
    font-family: 'DM Mono', monospace; font-size: 11.5px; color: #dc2626;
    display: none; line-height: 1.6;
  }
  .login-error.show { display: block; }

  .login-loading {
    margin-top: 20px; font-family: 'DM Mono', monospace;
    font-size: 11px; color: var(--text-muted); display: none;
    letter-spacing: 0.15em; text-transform: uppercase;
  }
  .login-loading.show { display: block; }

  footer {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-muted); letter-spacing: 0.18em; text-transform: uppercase;
  }

  /* ── 사용 신청 링크 (로그인 박스 하단) ── */
  .request-link-wrap {
    margin-top: 28px; padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex; flex-direction: column; gap: 8px; align-items: center;
  }
  .request-divider {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); letter-spacing: 0.05em;
  }
  .request-link {
    background: none; border: none; cursor: pointer;
    color: var(--accent); font-family: 'Noto Serif KR', serif;
    font-size: 13px; font-weight: 600; padding: 6px 12px;
    border-radius: 6px; transition: background 0.18s;
  }
  .request-link:hover { background: var(--accent-light); }

  /* ── 사용 신청 모달 ── */
  .req-backdrop {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.5);
    display: none; align-items: center; justify-content: center;
    z-index: 200; padding: 20px;
    animation: fadeIn 0.2s ease both;
  }
  .req-backdrop.show { display: flex; }

  .req-modal {
    background: #fff; border-radius: 16px;
    max-width: 440px; width: 100%;
    max-height: 90vh; overflow-y: auto;
    padding: 30px 28px; position: relative;
    box-shadow: 0 20px 60px rgba(0,0,0,0.25);
    animation: slideUp 0.25s ease both;
  }
  @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }

  .req-header { text-align: center; margin-bottom: 24px; }
  .req-header h2 {
    font-size: 20px; font-weight: 700; color: var(--text);
    margin-bottom: 6px; letter-spacing: -0.01em;
  }
  .req-header p {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); line-height: 1.6;
  }

  .req-field {
    display: block; margin-bottom: 14px;
  }
  .req-label {
    display: block; font-family: 'DM Mono', monospace;
    font-size: 10px; letter-spacing: 0.18em;
    color: var(--text-muted); text-transform: uppercase;
    margin-bottom: 6px;
  }
  .req-label em {
    color: var(--accent); font-style: normal; margin-left: 2px;
  }
  .req-field input, .req-field textarea {
    width: 100%; padding: 10px 12px;
    border: 1px solid var(--border); border-radius: 8px;
    font-family: 'Noto Serif KR', serif; font-size: 13px;
    color: var(--text); background: #fff;
    resize: vertical;
  }
  .req-field input:focus, .req-field textarea:focus {
    outline: none; border-color: var(--accent);
  }
  .req-hint {
    display: block; margin-top: 4px;
    font-family: 'DM Mono', monospace; font-size: 10px;
    color: var(--text-muted);
  }
  .req-hint.req-hint-warning {
    margin-top: 8px;
    padding: 8px 12px;
    background: #fef2f2;
    border: 1px solid #fecaca;
    border-left: 3px solid #dc2626;
    border-radius: 6px;
    font-family: 'Noto Serif KR', serif;
    font-size: 13px;
    font-weight: 700;
    color: #dc2626;
    line-height: 1.5;
    letter-spacing: -0.005em;
  }
  .req-hint.req-hint-warning::before {
    content: '⚠ ';
    margin-right: 2px;
  }

  /* 이메일 입력: ID 부분 + @gmail.com 고정 */
  .req-email-split {
    display: flex; align-items: stretch;
    border: 1px solid var(--border); border-radius: 8px;
    overflow: hidden;
    background: #fff;
    transition: border-color 0.18s;
  }
  .req-email-split:focus-within { border-color: var(--accent); }
  .req-email-split input {
    flex: 1; min-width: 0;
    padding: 10px 12px;
    border: none; outline: none;
    font-family: 'Noto Serif KR', serif; font-size: 13px;
    color: var(--text); background: transparent;
  }
  .req-email-split .domain-suffix {
    display: flex; align-items: center;
    padding: 0 12px;
    background: var(--surface);
    border-left: 1px solid var(--border);
    font-family: 'DM Mono', monospace; font-size: 13px;
    color: var(--text-muted); font-weight: 500;
    user-select: none; white-space: nowrap;
  }

  .req-error {
    display: none; padding: 10px 12px; margin-bottom: 12px;
    background: #fef2f2; border: 1px solid #fecaca; border-radius: 8px;
    font-family: 'DM Mono', monospace; font-size: 11px; color: #dc2626;
    line-height: 1.5;
  }
  .req-error.show { display: block; }

  .req-actions {
    display: flex; gap: 8px; justify-content: flex-end;
    margin-top: 8px;
  }
  .req-btn {
    padding: 10px 18px; border-radius: 8px;
    font-family: 'Noto Serif KR', serif; font-size: 13px; font-weight: 600;
    cursor: pointer; transition: all 0.18s;
    border: 1px solid var(--border); background: #fff; color: var(--text);
  }
  .req-btn-cancel:hover { border-color: var(--text-muted); }
  .req-btn-submit {
    background: var(--accent); color: #fff; border-color: var(--accent);
  }
  .req-btn-submit:hover { background: #a07c30; border-color: #a07c30; }
  .req-btn-submit:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

  /* 성공 화면 */
  .req-success {
    display: none; text-align: center; padding: 20px 0;
  }
  .req-success.show { display: block; }
  .req-success-icon {
    width: 56px; height: 56px;
    background: linear-gradient(135deg, #10b981, #059669);
    color: #fff; font-size: 28px; font-weight: 700;
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    margin: 0 auto 18px;
    box-shadow: 0 6px 20px rgba(16,185,129,0.3);
  }
  .req-success h3 {
    font-size: 18px; font-weight: 700; color: var(--text);
    margin-bottom: 10px;
  }
  .req-success p {
    font-family: 'DM Mono', monospace; font-size: 11px;
    color: var(--text-muted); line-height: 1.7;
    margin-bottom: 20px;
  }
</style>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, onAuthStateChanged, signOut as fbSignOut }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, doc, getDoc, addDoc, collection }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyAtodnuV2rXtJXHJb2kc0AjeLQIWbv1yzA",
  authDomain: "since2027-3fb3c.firebaseapp.com",
  projectId: "since2027-3fb3c",
  storageBucket: "since2027-3fb3c.firebasestorage.app",
  messagingSenderId: "931680118450",
  appId: "1:931680118450:web:e6c4b67cb77597f5164bab"
};

const app  = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db   = getFirestore(app);
const provider = new GoogleAuthProvider();

const boot       = document.getElementById('boot');
const loginEl    = document.getElementById('login');
const errorEl    = document.getElementById('login-error');
const loadingEl  = document.getElementById('login-loading');

// ── 그룹별 홈 페이지 매핑 ──────────────────────────────
// 이 매핑이 라우팅의 핵심. 새 역할 추가 시 여기만 수정하면 됨.
const ROLE_HOME = {
  admin:   '/admin.html',
  grade1:  '/study.html',
  grade2:  '/study.html',
  grade3:  '/study.html',
  grade4:  '/study.html',
  alumni:  '/study.html',
  family1: '/family/family1.html',
  family2: '/family/family2.html',
  family3: '/family/family3.html',
  family4: '/family/family4.html',
  family5: '/family/family5.html'
};

// 안전한 내부 경로인지 확인 (오픈 리다이렉트 방지)
function isSafePath(p) {
  return typeof p === 'string'
    && p.startsWith('/')
    && !p.startsWith('//')
    && !p.includes('://');
}

// ?from=... 파라미터 추출 (콘텐츠 페이지에서 비로그인 시 돌아갈 위치)
function getFromParam() {
  const params = new URLSearchParams(window.location.search);
  const from = params.get('from');
  return isSafePath(from) ? from : null;
}

// 화면 전환
function showLogin() {
  boot.classList.add('hide');
  loginEl.classList.add('show');
}

function showError(message) {
  errorEl.textContent = message;
  errorEl.classList.add('show');
}

function clearError() {
  errorEl.classList.remove('show');
  errorEl.textContent = '';
}

function showLoading() {
  loadingEl.classList.add('show');
}

function hideLoading() {
  loadingEl.classList.remove('show');
}

// ── Firestore: authRequired 플래그 ────────────────────
async function getAuthRequired() {
  try {
    const snap = await getDoc(doc(db, 'config', 'access'));
    if (snap.exists()) return snap.data().authRequired !== false;
    return true;
  } catch (e) { return true; }
}

// ── 사용자 정보 + 라우팅 ──────────────────────────────
async function routeUser(user) {
  showLoading();
  clearError();

  let userData;
  try {
    const snap = await getDoc(doc(db, 'allowedUsers', user.email));
    userData = snap.exists() ? snap.data() : null;
  } catch (e) {
    hideLoading();
    showError('접속 정보 확인 중 오류가 발생했습니다.');
    await fbSignOut(auth);
    showLogin();
    return;
  }

  if (!userData) {
    // 등록되지 않은 사용자
    hideLoading();
    await fbSignOut(auth);
    showLogin();
    showError(`${user.email} 은(는) 접근 권한이 없습니다.`);
    return;
  }

  const role = userData.role;

  // 1) 콘텐츠 페이지에서 비로그인으로 튕겨나와 로그인 후 돌아가는 경우
  //    auth-guard.js가 페이지에서 권한 검사하므로 여기서는 그냥 보내준다
  const from = getFromParam();
  if (from) {
    window.location.replace(from);
    return;
  }

  // 2) 역할별 홈으로 라우팅
  const home = ROLE_HOME[role];
  if (home) {
    window.location.replace(home);
  } else {
    // 알 수 없는 역할 — 로그아웃 처리
    hideLoading();
    await fbSignOut(auth);
    showLogin();
    showError('역할 설정 오류입니다. 관리자에게 문의하세요.');
  }
}

// ── 시작 ─────────────────────────────────────────────
(async () => {
  const authRequired = await getAuthRequired();

  if (!authRequired) {
    // 로그인 OFF 모드: 학생용 메인을 기본으로 보여줌
    window.location.replace('/study.html');
    return;
  }

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      await routeUser(user);
    } else {
      // 비로그인 → 로그인 화면
      showLogin();
    }
  });
})();

// ── Google 로그인 ─────────────────────────────────────
window.signInWithGoogle = async () => {
  clearError();
  try {
    await signInWithPopup(auth, provider);
    // 성공 시 onAuthStateChanged가 자동으로 routeUser 호출
  } catch (e) {
    if (e.code !== 'auth/popup-closed-by-user') {
      showError('로그인 중 오류가 발생했습니다.');
    }
  }
};

// ── 사용 신청 모달 ────────────────────────────────────
const reqModal     = document.getElementById('request-modal');
const reqForm      = document.querySelector('.req-form');
const reqSuccess   = document.getElementById('req-success');
const reqError     = document.getElementById('req-error');
const reqSubmitBtn = document.getElementById('req-submit-btn');

window.openRequestModal = () => {
  reqModal.classList.add('show');
  reqForm.style.display = '';
  reqSuccess.classList.remove('show');
  // 입력 초기화
  document.getElementById('req-name').value = '';
  document.getElementById('req-phone').value = '';
  document.getElementById('req-email').value = '';
  document.getElementById('req-message').value = '';
  reqError.classList.remove('show');
  reqSubmitBtn.disabled = false;
  reqSubmitBtn.textContent = '신청 보내기';
  // 첫 입력란에 포커스
  setTimeout(() => document.getElementById('req-name').focus(), 100);
};

window.closeRequestModal = () => {
  reqModal.classList.remove('show');
};

// 모달 백드롭 클릭 시 닫기 (모달 내부 클릭은 제외)
reqModal.addEventListener('click', (e) => {
  if (e.target === reqModal) closeRequestModal();
});
// ESC 키로 닫기
document.addEventListener('keydown', (e) => {
  if (e.key === 'Escape' && reqModal.classList.contains('show')) closeRequestModal();
});

// 이메일 ID 입력란: @gmail.com 자동 제거 + 소문자 변환
const reqEmailInput = document.getElementById('req-email');
reqEmailInput.addEventListener('input', (e) => {
  let v = e.target.value;
  // 풀 이메일을 붙여넣었다면 @gmail.com 제거
  const lower = v.toLowerCase();
  if (lower.includes('@gmail.com')) {
    v = lower.replace('@gmail.com', '');
  }
  // 공백 제거
  v = v.replace(/\s/g, '');
  if (v !== e.target.value) {
    e.target.value = v;
  }
});

// 클라이언트 단 중복 신청 방지 (브라우저 localStorage 활용)
// 1시간 = 3,600,000ms. localStorage는 브라우저 종료 후에도 유지되므로
// sessionStorage보다 효과적인 차단이 가능.
const REQUEST_COOLDOWN_MS = 60 * 60 * 1000; // 1시간

function checkRecentSubmission() {
  try {
    const last = localStorage.getItem('since2027_lastRequest');
    if (last) {
      const elapsed = Date.now() - parseInt(last, 10);
      if (elapsed < REQUEST_COOLDOWN_MS) {
        return REQUEST_COOLDOWN_MS - elapsed; // ms 단위로 반환
      }
    }
  } catch (e) {}
  return 0;
}

// ms를 사람이 읽기 쉬운 형식으로 ("45분 12초", "12초" 등)
function formatRemainingTime(ms) {
  const totalSeconds = Math.ceil(ms / 1000);
  const minutes = Math.floor(totalSeconds / 60);
  const seconds = totalSeconds % 60;
  if (minutes > 0) {
    return seconds > 0 ? `${minutes}분 ${seconds}초` : `${minutes}분`;
  }
  return `${seconds}초`;
}

function showReqError(msg) {
  reqError.textContent = msg;
  reqError.classList.add('show');
}

window.submitRequest = async () => {
  reqError.classList.remove('show');

  const name      = document.getElementById('req-name').value.trim();
  const phone     = document.getElementById('req-phone').value.trim();
  const emailIdRaw = document.getElementById('req-email').value.trim().toLowerCase();
  const message   = document.getElementById('req-message').value.trim();

  // 유효성 검사
  if (!name) {
    showReqError('이름을 입력해주세요.');
    return;
  }
  if (!emailIdRaw) {
    showReqError('이메일 아이디를 입력해주세요.');
    return;
  }
  // 사용자가 실수로 @gmail.com 까지 입력했다면 잘라냄
  let emailId = emailIdRaw;
  if (emailId.endsWith('@gmail.com')) {
    emailId = emailId.slice(0, -'@gmail.com'.length);
  }
  // @ 가 남아있으면 형식 오류
  if (emailId.includes('@')) {
    showReqError('@는 입력하지 마세요. ID만 입력하시면 자동으로 @gmail.com이 붙습니다.');
    return;
  }
  // Gmail ID 형식 검증: 영문/숫자/마침표 6~30자
  // (Gmail은 실제로 6~30자, 영문 시작, 영숫자/마침표만 허용)
  if (!/^[a-z0-9](\.?[a-z0-9])*$/.test(emailId)) {
    showReqError('Gmail ID 형식이 올바르지 않습니다. 영문/숫자/마침표만 사용 가능합니다.');
    return;
  }
  if (emailId.length < 6 || emailId.length > 30) {
    showReqError('Gmail ID는 6자 이상 30자 이하여야 합니다.');
    return;
  }

  const email = emailId + '@gmail.com';

  // 중복 신청 방지
  const waitMs = checkRecentSubmission();
  if (waitMs > 0) {
    showReqError(`최근에 이미 신청하셨습니다. ${formatRemainingTime(waitMs)} 후 다시 시도해주세요.`);
    return;
  }

  reqSubmitBtn.disabled = true;
  reqSubmitBtn.textContent = '전송 중...';

  try {
    const data = {
      name: name,
      email: email,
      createdAt: new Date().toISOString()
    };
    // 선택 필드는 입력된 경우에만 추가 (Rules의 keys().hasOnly() 통과)
    if (phone)   data.phone = phone;
    if (message) data.message = message;

    await addDoc(collection(db, 'accessRequests'), data);

    // 성공
    try { localStorage.setItem('since2027_lastRequest', String(Date.now())); } catch (e) {}
    reqForm.style.display = 'none';
    reqSuccess.classList.add('show');

  } catch (e) {
    reqSubmitBtn.disabled = false;
    reqSubmitBtn.textContent = '신청 보내기';
    showReqError('신청 전송에 실패했습니다. 잠시 후 다시 시도해주세요.');
    console.error('신청 실패:', e);
  }
};
</script>
